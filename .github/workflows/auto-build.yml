name: Auto Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12.1"
  NODE_VERSION: "20.11.0"
  MISE_VERSION: "2024.1.0"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}

    - name: Install mise
      run: |
        curl https://mise.jdx.dev/install.sh | sh
        echo "$HOME/.local/bin" >> $GITHUB_PATH

    - name: Configure Git
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git config --global commit.gpgsign false

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
        mise install

    - name: Run tests
      run: |
        mise exec -- pytest --cov=src --cov-report=xml

    - name: Run linting
      run: |
        mise exec -- ruff check .
        mise exec -- ruff format --check .
        mise exec -- mypy src tests

    - name: Build documentation
      run: |
        mise exec -- mkdocs build

    - name: Upload coverage
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        fail_ci_if_error: true

    - name: Deploy to GitHub Pages
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./site

    - name: Create Release
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
      run: |
        version=$(grep -m1 'version = ' pyproject.toml | cut -d'"' -f2)
        gh release create "v$version" \
          --title "Release v$version" \
          --generate-notes \
          --draft
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Notify on success
      if: success()
      run: |
        if [ -n "${{ secrets.WEBHOOK_URL }}" ]; then
          curl -X POST ${{ secrets.WEBHOOK_URL }} \
            -H "Content-Type: application/json" \
            -d "{\"text\":\"✅ Build successful for ${{ github.repository }}\"}"
        fi

    - name: Notify on failure
      if: failure()
      run: |
        if [ -n "${{ secrets.WEBHOOK_URL }}" ]; then
          curl -X POST ${{ secrets.WEBHOOK_URL }} \
            -H "Content-Type: application/json" \
            -d "{\"text\":\"❌ Build failed for ${{ github.repository }}\"}"
        fi
