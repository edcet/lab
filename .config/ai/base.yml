providers:
  ollama:
    endpoint: "http://localhost:11434"
    models:
      - name: "codellama:13b"
        capabilities:
          - code_generation
          - code_analysis
          - pattern_detection
        context_window: 16384
        max_tokens: 16384
        supports_function_calling: true
        temperature: 0.7

      - name: "qwq"
        capabilities:
          - text_generation
          - pattern_analysis
          - context_understanding
        context_window: 32768
        max_tokens: 32768
        temperature: 0.8

      - name: "mistral"
        capabilities:
          - code_generation
          - text_generation
          - pattern_analysis
        context_window: 8192
        max_tokens: 8192
        temperature: 0.7

      - name: "codegeex4"
        capabilities:
          - code_generation
          - code_analysis
          - pattern_detection
        context_window: 16384
        max_tokens: 16384
        supports_function_calling: true
        temperature: 0.7

routing_strategy: "adaptive"
health_check_interval: 30
metrics_enabled: true
